[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Redirect all /api/* requests to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Single page app — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
